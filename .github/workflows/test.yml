name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18.x, 20.x]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: sibylla-desktop/package-lock.json
      
      - name: Install dependencies
        working-directory: sibylla-desktop
        run: npm ci
      
      - name: Start Gitea (Test Environment)
        if: matrix.os == 'ubuntu-latest'
        working-directory: sibylla-cloud
        run: docker compose -f docker-compose.test.yml up -d
      
      - name: Wait for Gitea to be ready
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Waiting for Gitea to start..."
          for i in {1..30}; do
            if curl -s http://127.0.0.1:30011/api/v1/version > /dev/null; then
              echo "Gitea is up!"
              break
            fi
            sleep 2
          done

      - name: Create Gitea admin user
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Creating Gitea admin user..."
          docker exec sibylla-gitea-test gitea admin user create \
            --admin \
            --username sibylla-test-admin \
            --password test-admin-password-123 \
            --email admin@sibylla-test.local \
            --must-change-password=false || true

          echo "Verifying admin user..."
          BASIC_AUTH=$(echo -n 'sibylla-test-admin:test-admin-password-123' | base64)
          for i in {1..15}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Basic ${BASIC_AUTH}" \
              http://127.0.0.1:30011/api/v1/user)
            if [ "$STATUS" = "200" ]; then
              echo "Admin user is ready!"
              break
            fi
            echo "Attempt $i: admin not ready yet (HTTP $STATUS), retrying..."
            sleep 2
          done
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Admin user not available after retries"
            docker logs sibylla-gitea-test
            exit 1
          fi
      
      - name: Run unit tests
        working-directory: sibylla-desktop
        run: npm test
      
      - name: Run integration tests
        if: matrix.os == 'ubuntu-latest'
        working-directory: sibylla-desktop
        run: npm run test:integration
      
      - name: Stop Gitea
        if: always() && matrix.os == 'ubuntu-latest'
        working-directory: sibylla-cloud
        run: docker compose -f docker-compose.test.yml down -v
      
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.node-version == '20.x'
        uses: codecov/codecov-action@v3
        with:
          directory: sibylla-desktop/coverage
