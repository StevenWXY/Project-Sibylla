# 规格文档发布流程
# 手动触发，执行格式检查 → 内容审查 → 确认发布
id: spec-publish-flow
version: 1.0.0
name: 规格文档发布流程
description: 规格文档发布前的自动检查与确认
scope: public

# 触发器：仅手动触发
triggers:
  - type: manual
    name: 发布规格文档

# 输入参数
params:
  - name: file_path
    type: string
    required: true
  - name: strict
    type: boolean
    default: false
    description: "是否使用严格审查模式"

# 执行步骤
steps:
  - id: format_check
    name: 格式检查
    skill: spec-lint
    input:
      target: ${{ params.file_path }}
    on_failure: stop

  - id: content_review
    name: 内容审查
    sub_agent: spec-reviewer
    input:
      file: ${{ params.file_path }}
      strictness: ${{ params.strict }}
    on_failure: stop
    timeout: 300

  - id: confirm_publish
    name: 确认发布
    action: internal_notification
    input:
      title: "规格文档准备发布：${{ params.file_path }}"
      body: ${{ steps.content_review.output.summary }}
      channel: workspace
    requires_user_confirm: true

# 失败策略
on_workflow_failure:
  notify_user: true
  rollback: false
